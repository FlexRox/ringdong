<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doorbell</title>
  <style>
    :root {
      --bg1: #d9e6ff;
      --bg2: #b7cfff;
      --ink: #0f1a2f;
      --muted: #5c6b84;
      --glass: rgba(255,255,255,.42);
      --line: rgba(255,255,255,.55);
      --shadow: 0 18px 34px rgba(18,34,66,.18);
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1200px 800px at -10% -20%, #ffffff 0%, transparent 55%),
        radial-gradient(1000px 700px at 110% -10%, #c8d9ff 0%, transparent 50%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100dvh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 14px; display: grid; gap: 12px; }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,.58), rgba(255,255,255,.30));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.75);
    }
    .head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .title { font-weight: 700; letter-spacing: .2px; }
    .status {
      font-size: 12px; color: var(--muted);
      padding: 6px 10px; border-radius: 999px;
      background: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.7);
    }
    .livebox {
      margin-top: 10px; border: 1px solid rgba(255,255,255,.65); border-radius: 16px;
      overflow: hidden; background: #0b1020; aspect-ratio: 16 / 9; position: relative;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14);
    }
    video, audio { width: 100%; height: 100%; object-fit: contain; }
    .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #c8d3ea; font-size: 14px; text-align: center; padding: 14px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-top: 10px; }
    button, input {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.72);
      background: rgba(255,255,255,.62);
      color: #0f1a2f;
      padding: 9px 12px;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.78), 0 6px 12px rgba(16,28,52,.08);
    }
    button { cursor: pointer; font-weight: 650; transition: transform .14s ease, filter .2s ease; }
    button:hover { filter: brightness(1.03); }
    button:active { transform: scale(.98); }
    button.primary, button.ok, button.warn, button.danger {
      background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.58));
      border-color: rgba(255,255,255,.84);
    }
    button.primary { box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 8px 14px rgba(57,92,158,.14); }
    button.ok, button.warn, button.danger { box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 6px 10px rgba(16,28,52,.10); }
    .row { margin-top: 10px; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .events-head { display:flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .events { display: grid; gap: 8px; max-height: 45vh; overflow: auto; }
    .event {
      border: 1px solid rgba(255,255,255,.65); border-radius: 12px; padding: 9px 11px;
      display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 8px;
      background: rgba(255,255,255,.56); font-size: 14px;
    }
    .time { color: var(--muted); font-size: 12px; }
    a { color: #245eb8; text-decoration: none; }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="head">
        <div class="title">🔔 Doorbell Console</div>
        <div class="status" id="status">Bereit</div>
      </div>
      <div class="livebox">
        <video id="video" autoplay playsinline muted></video>
        <audio id="audio" autoplay></audio>
        <div class="placeholder" id="placeholder">Live ist aus. Klick auf „Live starten“.</div>
      </div>
      <div class="grid">
        <button id="btnLive" class="primary">📺 Live starten</button>
        <button id="btnUnlock" class="ok">🔓 Tür öffnen</button>
        <button id="btnRecord" class="danger">⏺ Aufnahme</button>
        <button id="btnTalk" class="warn">🎤 Sprechen starten</button>
      </div>
      <div class="row">
        <input id="ttsText" type="text" value="Hallo, ich bin gleich unten." placeholder="Text für Tür-Ansage" />
        <button id="btnTts" class="warn">🔊 TTS (Tür)</button>
      </div>
      <audio id="ttsPlayer" preload="none" style="display:none"></audio>
    </section>

    <section class="card">
      <div class="events-head">
        <span>Ereignisse</span>
        <span><a href="/recordings" target="_blank" rel="noopener">Alle Aufnahmen</a></span>
      </div>
      <div id="eventList" class="events"></div>
    </section>
  </main>

<script>
let cfg = { stream: '343ea4dd1515_live' };
let pc = null;
let live = false;
let talking = false;
let micStream = null;
let micSender = null;
const $ = (id) => document.getElementById(id);

const video = $('video');
const audio = $('audio');
const placeholder = $('placeholder');
const statusEl = $('status');
const btnLive = $('btnLive');
const ttsPlayer = $('ttsPlayer');

function errText(e){
  try {
    if (!e) return 'unbekannter Fehler';
    if (typeof e === 'string') return e;
    if (e.message && String(e.message).trim()) return e.message;
    return JSON.stringify(e);
  } catch {
    return String(e || 'unbekannter Fehler');
  }
}

function setStatus(t){ statusEl.textContent = t; }
function now(){ return new Date().toLocaleTimeString('de-DE'); }


function addEvent(type, label, time, url){
  const icon = type === 'ding' ? '🔔' : type === 'motion' ? '🚶' : type === 'unlock' ? '🔓' : type === 'clip' ? '🎬' : '📎';
  const row = document.createElement('div');
  row.className = 'event';
  row.innerHTML = `<span>${icon}</span><span>${label}${url ? ` <a href="${url}" target="_blank" rel="noopener">Öffnen</a>` : ''}</span><span class="time">${time || now()}</span>`;
  $('eventList').prepend(row);
  while ($('eventList').children.length > 80) $('eventList').removeChild($('eventList').lastChild);
}

async function loadCfg(){
  try {
    const r = await fetch('/api/config');
    cfg = await r.json();
  } catch (e) {
    addEvent('snapshot', `Config-Fehler: ${e}`);
  }
}

async function renegotiate(){
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  const resp = await fetch('/api/live/offer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'offer', sdp: offer.sdp, stream: cfg.stream })
  });
  const payload = await resp.json();
  if (!resp.ok || !payload.ok) throw new Error(payload.error || payload.detail || 'live proxy failed');
  await pc.setRemoteDescription(payload.answer);
}

async function startLive(){
  if (live) return;
  live = true;
  btnLive.textContent = '🛑 Live stoppen';
  setStatus('Live verbindet...');
  placeholder.style.display = 'none';

  try {
    pc = new RTCPeerConnection({ iceServers:[{ urls: 'stun:stun.l.google.com:19302' }] });
    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = (e) => {
      const stream = e.streams[0];
      if (e.track.kind === 'video') video.srcObject = stream;
      if (e.track.kind === 'audio') audio.srcObject = stream;
    };

    await renegotiate();
    setStatus('Live aktiv');
    addEvent('snapshot', 'Live gestartet');
  } catch (e) {
    addEvent('snapshot', `Live Fehler: ${errText(e)}`);
    stopLive(true);
  }
}

async function disableTalk(silent=false){
  if (micSender && pc) {
    try { pc.removeTrack(micSender); } catch {}
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
  }
  micSender = null;
  micStream = null;
  const wasTalking = talking;
  talking = false;
  $('btnTalk').textContent = '🎤 Sprechen starten';

  if (wasTalking && pc) {
    try { await renegotiate(); } catch {}
    if (!silent) addEvent('snapshot', 'Mikro aus');
  }
}

async function enableTalk(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    addEvent('snapshot', 'Sprechen nicht verfügbar: Browser/WebView blockiert Mikrofon');
    return;
  }
  if (!live) await startLive();
  if (!pc) {
    addEvent('snapshot', 'Sprechen nicht verfügbar: Live ist nicht aktiv');
    return;
  }
  if (talking) return;

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1,
      }
    });
    const micTrack = micStream.getAudioTracks()[0];
    micSender = pc.addTrack(micTrack, micStream);
    await renegotiate();
    talking = true;
    $('btnTalk').textContent = '🛑 Sprechen stoppen';
    addEvent('snapshot', 'Mikro aktiv – du kannst sprechen');
  } catch (e) {
    await disableTalk(true);
    addEvent('snapshot', `Sprechen fehlgeschlagen: ${errText(e)}`);
  }
}

function stopLive(silent=false){
  disableTalk(true);
  live = false;
  btnLive.textContent = '📺 Live starten';
  if (pc) { try { pc.close(); } catch {} }
  pc = null;
  video.srcObject = null;
  audio.srcObject = null;
  placeholder.style.display = 'flex';
  setStatus('Live aus');
  if (!silent) addEvent('snapshot', 'Live gestoppt');
}

async function unlock(){
  try {
    const r = await fetch('/api/unlock', { method:'POST' });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok) throw new Error(j.error || 'unlock failed');
    addEvent('unlock', 'Tür öffnen gesendet');
  } catch (e) {
    addEvent('snapshot', `Unlock Fehler: ${e.message || e}`);
  }
}

async function manualRecord(){
  try {
    const r = await fetch('/api/record', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ source:'manual' })
    });
    const j = await r.json();
    if (j.ok && j.cooldown) {
      addEvent('snapshot', `${j.info} – nutze letzte Aufnahme`, undefined, j.url || '/video/latest.mp4');
    } else if (j.ok) {
      addEvent('clip', `Aufnahme fertig: ${j.info}`, undefined, `/video/${j.info}`);
    } else {
      addEvent('snapshot', `Aufnahme fehlgeschlagen: ${j.info || 'unknown'}`);
    }
  } catch (e) {
    addEvent('snapshot', `Aufnahme API Fehler: ${errText(e)}`);
  }
}

async function speak(){
  const text = $('ttsText').value.trim();
  if (!text) return;

  try {
    const r = await fetch('/api/tts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
    const j = await r.json();
    if (!r.ok || !j.ok || !j.url) throw new Error(j.error || 'tts backend failed');

    ttsPlayer.src = `${j.url}?t=${Date.now()}`;
    await ttsPlayer.play();
    addEvent('snapshot', `🔊 TTS gesendet`, undefined, j.url);
  } catch (e) {
    addEvent('snapshot', `TTS Fehler: ${errText(e)}`);
  }
}

async function toggleTalk(){
  if (talking) {
    await disableTalk();
  } else {
    await enableTalk();
  }
}

function connectEvents(){
  const es = new EventSource('/events');
  const handle = (fallback, e) => {
    try {
      const j = JSON.parse(e.data);
      addEvent(j.type || fallback, j.label || fallback, j.time, j.url || '');
    } catch {
      addEvent(fallback, e.data || fallback);
    }
  };
  ['ding','motion','unlock','clip','snapshot'].forEach(name => es.addEventListener(name, (e) => handle(name, e)));
  es.onerror = () => setStatus('Events reconnect...');
}

btnLive.addEventListener('click', () => live ? stopLive() : startLive());
$('btnUnlock').addEventListener('click', unlock);
$('btnRecord').addEventListener('click', manualRecord);
$('btnTalk').addEventListener('click', toggleTalk);
$('btnTts').addEventListener('click', speak);
$('ttsText').addEventListener('keydown', (e) => { if (e.key === 'Enter') speak(); });

document.addEventListener('visibilitychange', () => { if (document.hidden && live) stopLive(true); });
window.addEventListener('pagehide', () => { if (live) stopLive(true); });

loadCfg();
connectEvents();
addEvent('snapshot', 'UI geladen');
</script>
</body>
</html>

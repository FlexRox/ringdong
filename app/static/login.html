<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RingDong Login</title>
  <style>
    :root { --ink:#0f172a; --muted:#60708a; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#dbe7ff,#bccfff);color:var(--ink)}
    .card{width:min(420px,92vw);padding:18px;border-radius:18px;border:1px solid rgba(255,255,255,.7);background:linear-gradient(135deg,rgba(255,255,255,.62),rgba(255,255,255,.34));backdrop-filter:blur(18px);box-shadow:0 18px 34px rgba(18,34,66,.18)}
    h1{margin:0 0 6px;font-size:20px}
    p{margin:0 0 14px;color:var(--muted);font-size:13px}
    .field{display:grid;gap:6px;margin-bottom:10px}
    label{font-size:12px;color:var(--muted)}
    input,button{min-height:44px;border-radius:14px;border:1px solid rgba(255,255,255,.78);background:rgba(255,255,255,.72);padding:9px 12px;font-size:14px;color:var(--ink)}
    button{cursor:pointer;font-weight:650}
    .msg{margin-top:10px;font-size:12px;color:#a33;min-height:16px}
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <h1>RingDong</h1>
    <p>Bitte anmelden, dann geht’s weiter zur Console.</p>
    <div class="field">
      <label>Nutzername</label>
      <input id="username" autocomplete="username" required />
    </div>
    <div class="field">
      <label>Passwort</label>
      <input id="password" type="password" autocomplete="current-password" required />
    </div>
    <button type="submit">Anmelden</button>
    <div class="msg" id="msg"></div>
  </form>
<script>
const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const r = await fetch('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password})});
    const j = await r.json().catch(()=>({}));
    if (!r.ok || !j.ok) throw new Error(j.error || 'Login fehlgeschlagen');
    window.location.href = '/';
  } catch (err) {
    msg.textContent = String(err.message || err);
  }
});
</script>
</body>
</html>
